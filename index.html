<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Trasloco Pro</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
    <!-- Favicon per evitare l'errore 404 -->
    <link rel="icon" href="data:,">
</head>
<body>
    <div id="header">
        <h1>
            📦 Trasloco Smart
            <span id="networkBadge" class="network-badge" aria-live="polite">Controllo rete...</span>
            <div class="backup-menu">
                <button id="btnBackupControl" type="button" title="Backup/Ripristino dati" aria-label="Apri menu backup" aria-haspopup="true" aria-expanded="false">💾</button>
                <div id="backupMenuPanel" class="backup-menu-panel" hidden>
                    <button type="button" data-backup-action="save">Salvataggio</button>
                    <button type="button" data-backup-action="restore">Ripristino</button>
                </div>
            </div>
        </h1>
    </div>

    <!-- Contenitore dinamico -->
    <main id="contenitorePannelli">
        <div style="padding: 20px;">Caricamento in corso...</div>
    </main>

    <!-- Menu Navigazione Inferiore -->
    <nav class="bottom-nav">
        <button id="nav-inserimento">📸 <span>Archivia</span></button>
        <button id="nav-gestione">🔍 <span>Cerca</span></button>
        <button id="nav-stanze">🏠 <span>Stanze</span></button>
        <button id="nav-scatole">📦 <span>Scatole</span></button>
    </nav>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch((error) => {
                    console.error('Registrazione Service Worker fallita:', error);
                });
            });
        }
    </script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  window.TRASLOCO_GOOGLE_CLIENT_ID = "747941135804-gi5pu0o3n3jhlaqhrcjuabqr7ncm2mo5.apps.googleusercontent.com";
</script>
    <!-- Includiamo Supabase e App -->
    <script type="module" src="scripts/app.js"></script>
</body>
</html>
