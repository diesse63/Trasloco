<section class="servizi-panel">
    <style>
        .servizi-panel {
            --s-accent: #0f766e;
            --s-accent-2: #c2410c;
            --s-card: #fff;
            --s-line: #d6d3d1;
            --s-bg: #fffcf5;
            background: linear-gradient(145deg, rgba(15, 118, 110, 0.08), rgba(194, 65, 12, 0.08));
            border: 1px solid var(--s-line);
            border-radius: 16px;
            padding: 16px;
        }

        .servizi-panel h2 {
            margin-top: 0;
        }

        .servizi-toolbar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
            padding: 12px;
            background: var(--s-bg);
            border: 1px solid var(--s-line);
            border-radius: 12px;
        }

        .servizi-card {
            background: var(--s-card);
            border: 1px solid var(--s-line);
            border-radius: 12px;
            padding: 12px;
        }

        .servizi-modal-form {
            display: grid;
            gap: 8px;
            margin-bottom: 10px;
        }

        .servizi-card input,
        .servizi-card textarea,
        .servizi-card select,
        .servizi-modal input,
        .servizi-modal textarea,
        .servizi-modal select,
        .servizi-toolbar input {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--s-line);
            border-radius: 8px;
            padding: 8px;
            font: inherit;
        }

        .servizi-card textarea,
        .servizi-modal textarea {
            min-height: 56px;
            resize: vertical;
        }

        .azioni {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .azioni button,
        .servizi-toolbar button {
            border: 1px solid var(--s-line);
            border-radius: 999px;
            padding: 7px 12px;
            cursor: pointer;
            font-weight: 600;
            background: #fff;
        }

        .azioni .primary,
        .servizi-toolbar button {
            background: var(--s-accent);
            color: #fff;
            border-color: var(--s-accent);
        }

        .mini-btn {
            border: 1px solid var(--s-line);
            border-radius: 6px;
            background: white;
            padding: 3px 7px;
            cursor: pointer;
            margin-right: 4px;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .servizi-msg {
            min-height: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .servizi-msg.ok {
            color: #047857;
        }

        .servizi-msg.err {
            color: #b91c1c;
        }

        .servizi-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .servizi-head h3 {
            margin: 0;
        }

        .servizi-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(28, 25, 23, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            z-index: 1000;
        }

        .servizi-modal-overlay.is-hidden {
            display: none;
        }

        .servizi-modal {
            width: min(520px, 100%);
            max-height: 90vh;
            overflow: auto;
            background: #fff;
            border: 1px solid var(--s-line);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 14px 34px rgba(28, 25, 23, 0.24);
        }

        .servizi-modal.is-hidden {
            display: none;
        }

        .servizi-modal-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .servizi-modal-top h4 {
            margin: 0;
        }

        .close-modal {
            border: 1px solid var(--s-line);
            border-radius: 8px;
            background: #fff;
            padding: 5px 9px;
            cursor: pointer;
            font-weight: 700;
        }

        .tree-box {
            margin-top: 14px;
            border: 1px solid var(--s-line);
            border-radius: 10px;
            padding: 10px;
            background: #fffef9;
        }

        .tree-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tree-head h4 {
            margin: 0;
            font-size: 15px;
        }

        .tree-summary {
            margin: 0 0 8px;
            color: #57534e;
            font-size: 13px;
        }

        .tree-root {
            display: grid;
            gap: 7px;
        }

        .tree-node {
            border: 1px solid #e7e5e4;
            border-radius: 8px;
            background: #fff;
        }

        .tree-node summary {
            cursor: pointer;
            list-style: none;
            padding: 8px 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .tree-node summary.is-selected {
            background: rgba(15, 118, 110, 0.12);
            box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.35);
        }

        .tree-node summary::-webkit-details-marker {
            display: none;
        }

        .tree-count {
            font-size: 12px;
            font-weight: 600;
            color: #57534e;
            background: #f5f5f4;
            border: 1px solid #e7e5e4;
            border-radius: 999px;
            padding: 2px 8px;
        }

        .tree-items {
            padding: 0 10px 10px;
            display: grid;
            gap: 6px;
        }

        .tree-item {
            border: 1px dashed #d6d3d1;
            border-radius: 8px;
            padding: 8px;
            background: #fffcf5;
        }

        .tree-item-top {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
            margin-bottom: 4px;
        }

        .tree-item-note {
            margin: 0;
            color: #57534e;
            font-size: 12px;
        }

        .tree-stanza-meta {
            margin: 0 10px 8px;
            color: #57534e;
            font-size: 12px;
        }

        .tree-stanza-actions {
            margin: 0 10px 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tree-empty {
            padding: 0 10px 10px;
            color: #78716c;
            font-size: 13px;
        }

        .stanza-focus {
            margin-top: 12px;
            border: 1px solid #ccfbf1;
            border-radius: 10px;
            background: #f0fdfa;
            padding: 10px;
        }

        .stanza-focus h5 {
            margin: 0 0 6px;
            font-size: 14px;
        }

        .stanza-focus-summary {
            margin: 0 0 8px;
            color: #134e4a;
            font-size: 13px;
        }

        .stanza-focus-list {
            display: grid;
            gap: 6px;
        }

        .stanza-focus-item {
            border: 1px solid #99f6e4;
            border-radius: 8px;
            background: #ffffff;
            padding: 8px;
        }

        .stanza-focus-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }

        .stanza-focus-note {
            margin: 0;
            color: #57534e;
            font-size: 12px;
        }
    </style>

    <div id="serviziMsg" class="servizi-msg"></div>

    <article class="servizi-card">
        <div class="servizi-head">
            <h3>Struttura Stanze e Mobili</h3>
            <div class="azioni">
                <button id="openStanzaModal" type="button">Nuova Stanza</button>
                <button id="editSelectedStanza" type="button">Modifica Stanza</button>
                <button id="deleteSelectedStanza" type="button">Elimina Stanza</button>
                <button id="openMobileModal" type="button">Nuovo Mobile</button>
            </div>
        </div>

        <section class="tree-box" aria-label="Mobili raggruppati per stanza">
            <div class="tree-head">
                <h4>Mobili per stanza</h4>
                <div class="azioni">
                    <button id="btnExpandMobiliTree" type="button">Espandi tutto</button>
                    <button id="btnCollapseMobiliTree" type="button">Comprimi tutto</button>
                </div>
            </div>
            <p id="mobiliTreeSummary" class="tree-summary"></p>
            <div id="mobiliTreeByStanza" class="tree-root"></div>
        </section>
    </article>

    <div id="serviziModalOverlay" class="servizi-modal-overlay is-hidden" aria-hidden="true">
        <div id="modalStanze" class="servizi-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitleStanze">
            <div class="servizi-modal-top">
                <h4 id="modalTitleStanze">Stanza</h4>
                <button class="close-modal" type="button" data-close-modal="stanze">Chiudi</button>
            </div>
            <form id="formStanze" class="servizi-modal-form">
                <input type="hidden" id="stanzaId">
                <label>
                    Nome stanza *
                    <input id="stanzaNome" type="text" required>
                </label>
                <label>
                    Note
                    <textarea id="stanzaNote"></textarea>
                </label>
                <div class="azioni">
                    <button class="primary" type="submit">Salva</button>
                    <button type="button" id="resetStanza">Annulla</button>
                </div>
            </form>
        </div>

        <div id="modalMobili" class="servizi-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitleMobili">
            <div class="servizi-modal-top">
                <h4 id="modalTitleMobili">Mobile</h4>
                <button class="close-modal" type="button" data-close-modal="mobili">Chiudi</button>
            </div>
            <form id="formMobili" class="servizi-modal-form">
                <input type="hidden" id="mobileId">
                <label>
                    Nome mobile *
                    <input id="mobileNome" type="text" required>
                </label>
                <label>
                    Stanza *
                    <select id="mobileStanza" required></select>
                </label>
                <label>
                    Note
                    <textarea id="mobileNote"></textarea>
                </label>
                <div class="azioni">
                    <button class="primary" type="submit">Salva</button>
                    <button type="button" id="resetMobile">Annulla</button>
                </div>
            </form>
        </div>
    </div>
</section>
